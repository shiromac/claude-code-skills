name: Validate public tree

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate allowlist and public content
        shell: pwsh
        run: .\scripts\validate-public-tree.ps1
